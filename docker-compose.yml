version: "3.8"

services:
  cli:
    build: .
    container_name: ai-platform-cli
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./corpus:/app/corpus
      - ./data:/app/data
    command: python -m chat.chat

  rag-api:
    build: .
    container_name: ai-platform-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./corpus:/app/corpus
      - ./data:/app/data
    command: uvicorn rag.api:app --host 0.0.0.0 --port 8000
